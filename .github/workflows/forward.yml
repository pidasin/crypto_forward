name: 每日前向測試訊號

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-signal:
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安裝套件
        run: pip install -r requirements.txt
      - name: 跑每日訊號
        run: python forward_daily.py
      - name: 把 log 存回 repo
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add forward_log.csv
          git diff --staged --quiet || git commit -m "前向測試紀錄 $(date -u +%Y-%m-%d)"
          git push
